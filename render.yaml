# Render Blueprint for SMAD (https://smad.live)
# Connect this repo in Render; the service will use these settings.

services:
  - type: web
    name: smad
    runtime: python
    region: oregon

    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: DATABASE_URL
        value: sqlite:///./smad.db
      # Admin OTP for Ideas & Feedback: add Resend (recommended) or SMTP_*.
      # Without them, the OTP is written to service logs only (Render → Logs).
      # - key: RESEND_API_KEY
      #   sync: false
      # - key: RESEND_FROM
      #   value: "SMAD <onboarding@resend.dev>"
      # - key: COMMUNITY_ADMIN_OTP_EMAIL
      #   value: your-admin@university.edu
      # Optional: for cluster console
      # - key: SSH_KEY_PATH
      #   sync: false
      # - key: SMAD_SSH_USER
      #   value: masternode1

    # Optional: persistent disk for SQLite (uncomment and set size in Render dashboard)
    # disk:
    #   name: smad-data
    #   mountPath: /opt/render/project/src
    #   sizeGB: 1
