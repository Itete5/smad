<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SMAD Analysis Platform</title>
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>
body {
  font-family: Inter, sans-serif;
  margin: 0;
  background: #0b0f14;
  color: white;
}
header {
  padding: 15px;
  font-size: 20px;
  font-weight: 600;
  background: #111827;
}
.container {
  display: grid;
  grid-template-columns: 250px 1fr;
  height: 100vh;
}
.sidebar {
  background: #0f172a;
  padding: 10px;
}
button {
  width: 100%;
  margin: 5px 0;
  padding: 10px;
  background: #1f2937;
  border: none;
  color: white;
  cursor: pointer;
}
.main {
  padding: 10px;
}
.plot {
  width: 100%;
  height: 500px;
}
</style>
</head>

<body>

<header>🧠 SMAD Analysis Platform</header>

<div class="container">

<div class="sidebar">
  <button onclick="runPhase()">Phase Diagram</button>
  <button onclick="runBand()">Band Structure</button>
  <button onclick="runDOS()">DOS</button>
  <button onclick="runXRD()">XRD</button>
  <button onclick="runTc()">Tc Map</button>
</div>

<div class="main">
  <div id="plot" class="plot"></div>
</div>

</div>

<script>

// -------------------- PHASE DIAGRAM --------------------
function runPhase() {

  let x = [], y = [];

  for (let i=0;i<20;i++){
    let xi = Math.random();
    let yi = -Math.random();
    x.push(xi);
    y.push(yi);
  }

  let trace = {
    x: x,
    y: y,
    mode: 'markers',
    marker: {size:10, color:'cyan'}
  };

  Plotly.newPlot('plot', [trace], {
    title: "Phase Diagram (Convex Hull Demo)",
    xaxis: {title:"Composition"},
    yaxis: {title:"Energy"}
  });
}

// -------------------- BAND STRUCTURE --------------------
function runBand() {

  let k = [];
  let bands = [];

  for(let i=0;i<100;i++){
    k.push(i/10);
  }

  for(let b=0;b<5;b++){
    let band = k.map(v => Math.sin(v + b));
    bands.push({
      x:k,
      y:band,
      mode:'lines',
      name:'Band '+b
    });
  }

  Plotly.newPlot('plot', bands, {
    title: "Band Structure",
    yaxis: {title:"Energy (eV)"}
  });
}

// -------------------- DOS --------------------
function runDOS() {

  let energy = [];
  let dos = [];

  for(let i=-50;i<50;i++){
    let e = i/10;
    energy.push(e);
    dos.push(Math.exp(-e*e));
  }

  let trace = {
    x: dos,
    y: energy,
    fill:'tozerox',
    type:'scatter'
  };

  Plotly.newPlot('plot', [trace], {
    title: "Density of States",
    yaxis:{title:"Energy"}
  });
}

// -------------------- XRD --------------------
function runXRD() {

  let theta = [];
  let intensity = [];

  for(let i=10;i<90;i++){
    theta.push(i);
    intensity.push(Math.sin(i/10)*Math.sin(i/10));
  }

  Plotly.newPlot('plot', [{
    x: theta,
    y: intensity,
    mode:'lines'
  }], {
    title:"XRD Pattern",
    xaxis:{title:"2θ"},
    yaxis:{title:"Intensity"}
  });
}

// -------------------- Tc MAP --------------------
function runTc() {

  let lambda = [];
  let omega = [];
  let z = [];

  for(let i=0;i<50;i++){
    lambda.push(i/10);
    omega.push(i*20);
  }

  for(let i=0;i<lambda.length;i++){
    let row = [];
    for(let j=0;j<omega.length;j++){
      let Tc = (omega[j]/1.2)*Math.exp(-1/(lambda[i]+0.1));
      row.push(Tc);
    }
    z.push(row);
  }

  Plotly.newPlot('plot', [{
    z: z,
    x: omega,
    y: lambda,
    type: 'heatmap'
  }], {
    title:"Tc Heatmap",
    xaxis:{title:"ω_log"},
    yaxis:{title:"λ"}
  });
}

</script>

</body>
</html>
