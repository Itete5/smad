<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Analysis · SMAD</title>
<link rel="icon" href="/static/favicon.png?v=atom" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   DESIGN TOKENS — BURAI palette (shared with rest of SMAD)
═══════════════════════════════════════════════════════════ */
:root{
  --bg0:#c8c8c8; --bg1:#e8e8e8; --bg2:#f0f0f0; --bg3:#ffffff;
  --bg4:#d4d4d4; --bg5:#dddddd;
  --bdr:#bbbbbb; --bdr2:#999999;
  --tx0:#111111; --tx1:#333333; --tx2:#555555; --tx3:#888888;
  --acc:#ff6600; --acc-d:#e05500; --acc-l:#fff5ef;
  --grn:#2a9d2a;
  --r:3px; --r2:5px;
  --t:.14s ease;
  --sans:'Roboto',sans-serif;
  --mono:'JetBrains Mono',monospace;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--sans);font-size:13px;background:var(--bg0);color:var(--tx1);
  display:flex;flex-direction:column;min-height:100vh;
}

/* ═══════════════════════════════════════════════════════════
   TOP NAVIGATION
═══════════════════════════════════════════════════════════ */
#navbar{
  height:34px;background:var(--bg4);border-bottom:2px solid var(--acc);
  display:flex;align-items:stretch;flex-shrink:0;
}
.nav-tab{
  display:flex;align-items:center;gap:6px;padding:0 16px;
  font-size:12px;color:var(--tx2);cursor:pointer;text-decoration:none;
  border-right:1px solid var(--bdr);transition:background var(--t),color var(--t);
}
.nav-tab:hover{background:var(--bg5);color:var(--tx0)}
.nav-tab.active{background:var(--bg3);color:var(--tx0);font-weight:600}
.nav-tab svg{flex-shrink:0}

/* ═══════════════════════════════════════════════════════════
   WORKSPACE — main content + sidebar
═══════════════════════════════════════════════════════════ */
#workspace{
  flex:1;display:flex;min-height:0;
}

/* ── MAIN CONTENT (wide, left) ── */
#main{
  flex:1;min-width:0;background:var(--bg3);position:relative;
  display:flex;flex-direction:column;
}

/* ── DROP ZONE ── */
#drop-zone{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:32px 20px;text-align:center;cursor:pointer;transition:background var(--t);
}
#drop-zone.drag-over{background:var(--acc-l)}

.dz-icon{
  width:56px;height:56px;border-radius:50%;border:1.5px solid var(--bdr);
  background:var(--bg3);display:flex;align-items:center;justify-content:center;
  margin-bottom:18px;color:var(--tx2);transition:border-color var(--t),background var(--t);
}
#drop-zone.drag-over .dz-icon{border-color:var(--acc);background:var(--acc-l)}

.dz-title{font-size:15px;font-weight:600;color:var(--tx0);margin-bottom:6px}
.dz-sub{font-size:12px;color:var(--tx3);margin-bottom:20px;max-width:340px;line-height:1.5}

.dz-badges{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:28px;max-width:420px}
.dz-badge{
  padding:3px 9px;border:1px solid var(--bdr);border-radius:var(--r);
  font-size:11px;font-family:var(--mono);color:var(--tx2);background:var(--bg2);
}

.dz-actions{display:flex;flex-direction:column;align-items:center;gap:10px}
.dz-btn{
  display:inline-flex;align-items:center;gap:7px;padding:10px 28px;
  border:none;border-radius:var(--r2);font-size:13px;font-weight:700;
  font-family:var(--sans);cursor:pointer;transition:background var(--t),border-color var(--t),color var(--t);
}
.dz-btn.primary{background:var(--acc);color:#fff}
.dz-btn.primary:hover{background:var(--acc-d)}
.dz-or{font-size:11px;color:var(--tx3)}
.dz-btn.secondary{background:var(--bg3);border:1px solid var(--bdr);color:var(--tx1);font-weight:600}
.dz-btn.secondary:hover{background:var(--bg2);border-color:var(--bdr2);color:var(--tx0)}

.dz-loaded{
  display:none;align-items:center;gap:6px;margin-top:16px;font-size:11.5px;
  font-family:var(--mono);color:var(--grn);
}
.dz-loaded.show{display:flex}

#dz-input{display:none}

/* ═══════════════════════════════════════════════════════════
   SIDEBAR (right, fixed width, light gray)
═══════════════════════════════════════════════════════════ */
#sidebar{
  width:280px;flex-shrink:0;background:var(--bg1);border-left:1px solid var(--bdr);
  display:flex;flex-direction:column;overflow:hidden;
}
#sidebar-scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;min-height:0;
  scrollbar-width:thin;
}
#sidebar-scroll::-webkit-scrollbar{width:5px}
#sidebar-scroll::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:3px}

.sb-sec{
  padding:14px 14px 5px;font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:var(--tx3);
}
.sb-field{padding:0 14px 12px;display:flex;flex-direction:column;gap:5px}
.sb-label{font-size:11px;font-weight:500;color:var(--tx2)}

.sb-select-wrap{position:relative}
.sb-select,.sb-input{
  width:100%;height:29px;background:var(--bg3);border:1px solid var(--bdr);
  border-radius:var(--r);font-size:12px;color:var(--tx0);padding:0 26px 0 9px;
  font-family:var(--sans);cursor:pointer;transition:border-color var(--t);
  appearance:none;-webkit-appearance:none;
}
.sb-input{cursor:text;padding:0 9px;font-family:var(--mono)}
.sb-select:focus,.sb-input:focus{border-color:var(--acc);outline:none}
.sb-caret{
  position:absolute;right:9px;top:50%;transform:translateY(-50%);
  pointer-events:none;color:var(--tx3);
}

.sb-file-row{display:flex;gap:5px}
.sb-file-row .sb-input{flex:1;cursor:pointer}
.sb-browse{
  height:29px;padding:0 10px;background:var(--bg3);border:1px solid var(--bdr);
  border-radius:var(--r);font-size:12px;color:var(--tx1);cursor:pointer;
  font-family:var(--mono);flex-shrink:0;transition:all var(--t);
}
.sb-browse:hover{background:var(--bg2);border-color:var(--bdr2)}

.sb-divider{height:1px;background:var(--bdr);margin:2px 14px 10px}

.sb-checks{padding:0 14px 4px;display:flex;flex-direction:column;gap:10px}
.sb-check{
  display:flex;align-items:center;gap:8px;font-size:12px;color:var(--tx1);
  cursor:pointer;line-height:1.3;
}
.sb-check input{width:14px;height:14px;accent-color:var(--acc);cursor:pointer;flex-shrink:0}

/* ▶ Plot button pinned to bottom */
#plot-btn-wrap{padding:12px 14px 14px;border-top:1px solid var(--bdr);flex-shrink:0;background:var(--bg1)}
#plot-btn{
  width:100%;padding:11px;background:var(--acc);border:none;border-radius:var(--r2);
  color:#fff;font-size:13px;font-weight:700;font-family:var(--sans);cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:background var(--t);
}
#plot-btn:hover{background:var(--acc-d)}

/* ═══════════════════════════════════════════════════════════
   BOTTOM STATUS BAR
═══════════════════════════════════════════════════════════ */
#statusbar{
  height:32px;background:var(--bg4);border-top:2px solid var(--acc);
  display:flex;align-items:stretch;flex-shrink:0;
}
#status-left{
  display:flex;align-items:center;gap:8px;padding:0 14px;
  font-size:12px;font-weight:700;color:var(--tx0);white-space:nowrap;
}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--grn);box-shadow:0 0 4px var(--grn);flex-shrink:0}
.status-dot.run{background:var(--acc);box-shadow:0 0 4px var(--acc);animation:pulse .8s infinite alternate}
@keyframes pulse{to{opacity:.25}}
#status-spacer{flex:1}
#status-right{display:flex;align-items:stretch;border-left:1px solid var(--bdr)}
#status-idle{
  display:flex;align-items:center;padding:0 14px;font-size:11px;
  font-family:var(--mono);color:var(--tx3);border-right:1px solid var(--bdr);
  white-space:nowrap;
}
#status-export{
  display:flex;align-items:center;gap:5px;padding:0 14px;font-size:11.5px;
  color:var(--tx2);cursor:pointer;transition:background var(--t),color var(--t);
  white-space:nowrap;
}
#status-export:hover{background:var(--bg5);color:var(--tx0)}

/* ═══════════════════════════════════════════════════════════
   RESPONSIVE
═══════════════════════════════════════════════════════════ */
@media (max-width:820px){
  #workspace{flex-direction:column;overflow-y:auto}
  #sidebar{
    width:100%;border-left:none;border-top:1px solid var(--bdr);
    max-height:none;
  }
  #sidebar-scroll{overflow-y:visible}
  #main{min-height:360px}
  #plot-btn-wrap{position:sticky;bottom:0}
}
@media (max-width:480px){
  .nav-tab{padding:0 11px;font-size:11.5px}
  .dz-badges{max-width:280px}
  .dz-title{font-size:14px}
}
</style>
</head>
<body>

<!-- TOP NAVIGATION -->
<nav id="navbar">
  <a class="nav-tab" href="/">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    SMAD Home
  </a>
  <div class="nav-tab active">Analysis</div>
</nav>

<!-- WORKSPACE -->
<div id="workspace">

  <!-- MAIN CONTENT -->
  <div id="main">
    <div id="drop-zone" onclick="dzClick()" ondragover="dzDragOver(event)" ondragleave="dzDragLeave()" ondrop="dzDrop(event)">
      <input type="file" id="dz-input" accept=".dat,.freq,.out,.xyz,.cif,.poscar,.vasp,.csv,.json" onchange="dzFileChosen(this.files[0])"/>

      <div class="dz-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
      </div>

      <div class="dz-title">Drop file or click to upload</div>
      <div class="dz-sub">Upload your ph.x output file to run the Raman simulation.</div>

      <div class="dz-badges">
        <span class="dz-badge">.dat</span>
        <span class="dz-badge">.freq</span>
        <span class="dz-badge">.out</span>
        <span class="dz-badge">.xyz</span>
        <span class="dz-badge">CIF</span>
        <span class="dz-badge">POSCAR</span>
        <span class="dz-badge">.csv</span>
        <span class="dz-badge">.json</span>
      </div>

      <div class="dz-actions">
        <button class="dz-btn primary" onclick="event.stopPropagation();dzClick()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          Select file
        </button>
        <div class="dz-or">or</div>
        <button class="dz-btn secondary" onclick="event.stopPropagation();dzLoadSample()">
          ✺ Load sample data
        </button>
      </div>

      <div class="dz-loaded" id="dz-loaded">
        <span style="color:var(--grn)">✓</span><span id="dz-fname"></span>
      </div>
    </div>
  </div><!-- /main -->

  <!-- SIDEBAR -->
  <div id="sidebar">
    <div id="sidebar-scroll">

      <div class="sb-sec">Analysis</div>
      <div class="sb-field">
        <div class="sb-select-wrap">
          <select class="sb-select" id="analysis-select">
            <option selected>Raman Simulation</option>
            <option>Infrared (IR)</option>
            <option>Band Structure</option>
            <option>DOS / PDOS</option>
            <option>Phonon Dispersion</option>
            <option>g(r) RDF</option>
          </select>
          <span class="sb-caret">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </div>
      </div>

      <div class="sb-divider"></div>

      <div class="sb-sec">Data</div>
      <div class="sb-field">
        <div class="sb-label">ph.x output file</div>
        <div class="sb-file-row">
          <input class="sb-input" id="raman-file" placeholder="No file selected" readonly onclick="dzClick()"/>
          <button class="sb-browse" onclick="dzClick()">…</button>
        </div>
      </div>
      <div class="sb-field">
        <div class="sb-label">Laser wavelength (nm)</div>
        <input class="sb-input" type="number" value="532" step="1" min="200" max="1500"/>
      </div>
      <div class="sb-checks">
        <label class="sb-check"><input type="checkbox" checked> Lorentzian broadening</label>
        <label class="sb-check"><input type="checkbox"> Non-resonant only</label>
      </div>

      <div class="sb-divider"></div>

      <div class="sb-sec">Output</div>
      <div class="sb-field">
        <div class="sb-label">Output format</div>
        <div class="sb-select-wrap">
          <select class="sb-select">
            <option selected>PNG (300 dpi)</option>
            <option>SVG</option>
            <option>PDF</option>
          </select>
          <span class="sb-caret">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </div>
      </div>
      <div class="sb-field">
        <div class="sb-label">Colour scheme</div>
        <div class="sb-select-wrap">
          <select class="sb-select">
            <option selected>BURAI default</option>
            <option>Publication B&amp;W</option>
            <option>Viridis</option>
          </select>
          <span class="sb-caret">
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
          </span>
        </div>
      </div>
      <div class="sb-checks" style="padding-bottom:14px">
        <label class="sb-check"><input type="checkbox" id="advanced-toggle" onchange="toggleAdvanced(this)"> Advanced settings</label>
        <label class="sb-check"><input type="checkbox"> Show grid</label>
        <label class="sb-check"><input type="checkbox"> Show legend</label>
      </div>

    </div><!-- /sidebar-scroll -->

    <div id="plot-btn-wrap">
      <button id="plot-btn" onclick="runPlot()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Plot
      </button>
    </div>
  </div><!-- /sidebar -->

</div><!-- /workspace -->

<!-- BOTTOM STATUS BAR -->
<div id="statusbar">
  <div id="status-left">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-label">Raman Simulation</span>
  </div>
  <div id="status-spacer"></div>
  <div id="status-right">
    <span id="status-idle">Idle</span>
    <span id="status-export" onclick="exportPlot()">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export
    </span>
  </div>
</div>

<script>
function dzClick(){ document.getElementById('dz-input').click(); }
function dzDragOver(e){ e.preventDefault(); document.getElementById('drop-zone').classList.add('drag-over'); }
function dzDragLeave(){ document.getElementById('drop-zone').classList.remove('drag-over'); }
function dzDrop(e){
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('drag-over');
  const file = e.dataTransfer?.files?.[0];
  if(file) dzFileChosen(file);
}
function dzFileChosen(file){
  if(!file) return;
  document.getElementById('raman-file').value = file.name;
  showLoaded(file.name);
  setStatus('Loaded: ' + file.name);
}
function dzLoadSample(){
  document.getElementById('raman-file').value = 'sample_raman.dyn';
  showLoaded('sample_raman.dyn');
  setStatus('Sample data loaded');
}
function showLoaded(name){
  document.getElementById('dz-fname').textContent = name;
  document.getElementById('dz-loaded').classList.add('show');
}
function setStatus(s){ document.getElementById('status-idle').textContent = s; }
function toggleAdvanced(el){
  setStatus(el.checked ? 'Advanced settings enabled' : 'Idle');
}
function runPlot(){
  const dot = document.getElementById('status-dot');
  dot.classList.add('run');
  setStatus('Rendering…');
  setTimeout(() => {
    dot.classList.remove('run');
    setStatus('Done');
  }, 700);
}
function exportPlot(){
  alert('Connect to cluster for live data export.');
}

document.getElementById('analysis-select').addEventListener('change', function(){
  document.getElementById('status-label').textContent = this.value;
  setStatus('Idle');
});
</script>
</body>
</html>
