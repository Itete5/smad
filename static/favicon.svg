<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="disc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a237e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="mag" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff"/>
      <stop offset="100%" style="stop-color:#79b8ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" fill="#0d1117" rx="4"/>
  <!-- Superconducting disc -->
  <ellipse cx="16" cy="24" rx="10" ry="3" fill="url(#disc)" opacity="0.95"/>
  <ellipse cx="16" cy="23" rx="8" ry="2" fill="#16213e" opacity="0.8"/>
  <!-- Levitating magnet -->
  <rect x="11" y="8" width="10" height="6" rx="1" fill="url(#mag)" filter="url(#glow)"/>
  <rect x="12" y="9" width="8" height="4" rx="0.5" fill="none" stroke="#c9d1d9" stroke-width="0.5" opacity="0.6"/>
</svg>
