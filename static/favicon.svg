<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="disc" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#90caf9"/>
      <stop offset="100%" style="stop-color:#e3f2fd"/>
    </linearGradient>
    <linearGradient id="discEdge" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#64b5f6"/>
      <stop offset="100%" style="stop-color:#bbdefb"/>
    </linearGradient>
  </defs>
  <!-- Bright background -->
  <rect width="32" height="32" fill="#e8eef4" rx="6"/>
  <!-- Superconducting disc (Meissner base) – bright -->
  <ellipse cx="16" cy="25" rx="12" ry="4" fill="url(#disc)" stroke="url(#discEdge)" stroke-width="0.8"/>
  <!-- Levitating magnet – dark -->
  <rect x="10" y="6" width="12" height="8" rx="1.5" fill="#1a237e"/>
  <rect x="11" y="7" width="10" height="6" rx="1" fill="none" stroke="#0d1442" stroke-width="0.6" opacity="0.9"/>
</svg>
